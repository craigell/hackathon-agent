apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: otel-prometheus-scraper
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: Loki
    type: loki
    uid: otel-loki-scraper
    access: proxy
    url: http://loki:3100
  - name: Infinity DataSource
    type: yesoreyeram-infinity-datasource
    jsonData:
      customHealthCheckEnabled: true
      customHealthCheckUrl: 'http://agent-with-nginx-plus:9095/health'
